<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CitySpotter</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d6efd" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">CitySpotter</span>
      </div>
    </nav>

    <main class="container">
      <section class="card shadow-sm mb-4">
        <div class="card-body text-center">
          <h5 class="card-title text-center">Zgłoś problem</h5>
          <img id="photo-preview" class="photo-preview mb-3" />

          <input
            type="file"
            id="camera-input"
            accept="image/*"
            capture="environment"
            class="d-none"
          />

          <button id="btn-capture" class="btn btn-lg btn-primary w-100 mb-2">
            Zrób zdjęcie
          </button>
        </div>
      </section>

      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title text-center">Lokalizacja zdarzenia</h5>
          <div id="map"></div>
          <p class="text-muted small" id="location-status">
            Oczekiwanie na sygnał GPS
          </p>
        </div>
      </section>

      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title text-center">Treść zgłoszenia</h5>
          <textarea
            id="report-text"
            class="form-control"
            rows="3"
            placeholder="Krótko opisz problem"
          ></textarea>
        </div>
      </section>

      <div class="d-grid gap-2 mb-4">
        <button id="btn-share" class="btn btn-success btn-lg" disabled>
          Udostępnij zgłoszenie
        </button>
      </div>

      <section class="card shadow-sm mb-5">
        <div class="card-body">
          <h5 class="card-title text-center">Aktualne zgłoszenia</h5>
          <div id="reports-list" class="reports-list">
            <p class="text-muted mb-0">Brak zapisanych zgłoszeń</p>
          </div>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
